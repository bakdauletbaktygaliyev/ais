networks:
  ais-net:
    driver: bridge

volumes:
  neo4j-data:
  neo4j-logs:
  redis-data:
  qdrant-data:


services:

  neo4j:
    image: neo4j:5.23-community
    container_name: ais-neo4j
    restart: unless-stopped
    networks: [ ais-net ]
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-changeme}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*"
      NEO4J_dbms_memory_heap_initial__size: "512m"
      NEO4J_dbms_memory_heap_max__size: "2g"
      NEO4J_dbms_memory_pagecache_size: "512m"
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:7474/" ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7.4-alpine
    container_name: ais-redis
    restart: unless-stopped
    networks: [ ais-net ]
    ports:
      - "6379:6379"
    command: >
      redis-server
        --maxmemory 256mb
        --maxmemory-policy allkeys-lru
        --save 60 1
    volumes:
      - redis-data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.12.1
    container_name: ais-qdrant
    restart: unless-stopped
    networks: [ ais-net ]
    ports:
      - "6333:6333"
      - "6334:6334"
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
    volumes:
      - qdrant-data:/qdrant/storage
    healthcheck:
      test: [ "CMD-SHELL", "bash -c 'cat < /dev/null > /dev/tcp/localhost/6333' || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  ais-ai:
    build:
      context: ./ais-ai
      dockerfile: Dockerfile
    container_name: ais-ai
    restart: unless-stopped
    networks: [ ais-net ]
    ports:
      - "50051:50051"
    env_file:
      - .env
    environment:
      QDRANT_URL: http://qdrant:6333
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-changeme}
      GRPC_PORT: 50051
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      neo4j:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "python", "-c", "import grpc; ch=grpc.insecure_channel('localhost:50051'); grpc.channel_ready_future(ch).result(timeout=5)" ]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 20s

  ais-back:
    build:
      context: ./ais-back
      dockerfile: Dockerfile
    container_name: ais-back
    restart: unless-stopped
    networks: [ ais-net ]
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      APP_PORT: 8080
      APP_ENV: ${APP_ENV:-development}
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-changeme}
      NEO4J_DATABASE: neo4j
      REDIS_URL: redis://redis:6379
      GRPC_AI_ADDR: ais-ai:50051
      LOG_LEVEL: ${LOG_LEVEL:-info}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
    depends_on:
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
      ais-ai:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:8080/health" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  ais-front:
    build:
      context: ./ais-front
      dockerfile: Dockerfile
    container_name: ais-front
    restart: unless-stopped
    networks: [ ais-net ]
    ports:
      - "4200:80"
    depends_on:
      ais-back:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:80/" ]
      interval: 15s
      timeout: 5s
      retries: 3
