name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: "1.24"
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

jobs:

  # ────────────────────────────────────────────────────────────
  # ais-back (Go)
  # ────────────────────────────────────────────────────────────
  test-back:
    name: "ais-back · Go tests"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ais-back

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: ais-back/go.sum

      - name: Install system deps (tree-sitter needs gcc)
        run: sudo apt-get install -y gcc

      - name: Download modules
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Run tests
        run: go test -v -race -coverprofile=coverage.out ./...

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ais-back/coverage.out
          flags: ais-back
          fail_ci_if_error: false

  # ────────────────────────────────────────────────────────────
  # ais-ai (Python)
  # ────────────────────────────────────────────────────────────
  test-ai:
    name: "ais-ai · Python tests"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ais-ai

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: ais-ai/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt pytest-asyncio pytest-cov

      - name: Run unit tests
        run: pytest tests/unit -v --cov=src --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ais-ai/coverage.xml
          flags: ais-ai
          fail_ci_if_error: false

  # ────────────────────────────────────────────────────────────
  # ais-front (Angular)
  # ────────────────────────────────────────────────────────────
  test-front:
    name: "ais-front · Angular build"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ais-front

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ais-front/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Type-check
        run: npx tsc --noEmit

      - name: Production build
        run: npm run build:prod

  # ────────────────────────────────────────────────────────────
  # Docker builds (only on main)
  # ────────────────────────────────────────────────────────────
  docker-build:
    name: "Docker · Build images"
    runs-on: ubuntu-latest
    needs: [test-back, test-ai, test-front]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push ais-back
        uses: docker/build-push-action@v5
        with:
          context: ./ais-back
          push: true
          tags: ghcr.io/${{ github.repository }}/ais-back:${{ github.sha }},ghcr.io/${{ github.repository }}/ais-back:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push ais-ai
        uses: docker/build-push-action@v5
        with:
          context: ./ais-ai
          push: true
          tags: ghcr.io/${{ github.repository }}/ais-ai:${{ github.sha }},ghcr.io/${{ github.repository }}/ais-ai:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push ais-front
        uses: docker/build-push-action@v5
        with:
          context: ./ais-front
          push: true
          tags: ghcr.io/${{ github.repository }}/ais-front:${{ github.sha }},ghcr.io/${{ github.repository }}/ais-front:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
