<div class="chat">
  <div class="chat-header">
    <span class="chat-title">🤖 AI Assistant</span>
    <button class="btn-close" (click)="close.emit()">✕</button>
  </div>

  <div class="messages">
    <div
      *ngFor="let msg of messages"
      class="message"
      [class.user]="msg.role === 'user'"
      [class.assistant]="msg.role === 'assistant'"
    >
      <div class="msg-bubble">
        <span *ngIf="msg.loading" class="typing">
          <span></span><span></span><span></span>
        </span>
        <span *ngIf="!msg.loading" class="msg-text">{{ msg.content }}</span>
      </div>
    </div>
  </div>

  <div class="chat-input-area">
    <div class="context-tag" *ngIf="currentPath">
      📁 {{ currentPath }}
    </div>
    <div class="input-row">
      <textarea
        [(ngModel)]="input"
        placeholder="Ask about the architecture…"
        (keydown.enter)="onEnter($event)"
        [disabled]="sending"
        rows="2"
      ></textarea>
      <button class="btn-send" (click)="send()" [disabled]="!input.trim() || sending">
        ↑
      </button>
    </div>
    <div class="input-hint">Enter to send · Shift+Enter for newline</div>
  </div>
</div>
